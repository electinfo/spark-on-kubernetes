---
# Build opensearch-hadoop spark-40 module from source and publish to Nexus.
# Required because the opensearch-spark-40_2.13 artifact has never been published
# to Maven Central. The module exists in the opensearch-hadoop source tree and
# builds against Spark 4.1.x on the main branch.
#
# Usage:
#   kubectl apply -f tasks/opensearch-spark-publish.yaml
#   kubectl create -f tasks/opensearch-spark-taskrun.yaml
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: opensearch-spark-publish
  namespace: tekton-pipelines
spec:
  description: Build opensearch-hadoop spark-40 from source and publish to Nexus
  params:
    - name: branch
      type: string
      default: "main"
      description: opensearch-hadoop git branch to build
    - name: publish-version
      type: string
      default: "1.3.0-spark411"
      description: Version string for published artifact
  results:
    - name: spark-artifact
      description: Published opensearch-spark artifact coordinates
  steps:
    - name: build-and-publish
      image: eclipse-temurin:17-jdk
      env:
        - name: JAVA_OPTS
          value: "-Xmx4g -Xms1g"
        - name: NEXUS_USER
          valueFrom:
            secretKeyRef:
              name: nexus-credentials
              key: username
        - name: NEXUS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexus-credentials
              key: password
      computeResources:
        requests:
          memory: "4Gi"
          cpu: "2"
        limits:
          memory: "6Gi"
          cpu: "4"
      script: |
        #!/bin/bash
        set -e

        echo "=== Installing git ==="
        apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1

        echo "=== Cloning opensearch-hadoop $(params.branch) ==="
        git clone --depth 1 --branch $(params.branch) \
          https://github.com/opensearch-project/opensearch-hadoop.git /tmp/opensearch-hadoop
        cd /tmp/opensearch-hadoop

        echo "=== Spark version in gradle.properties ==="
        grep spark40Version gradle.properties

        echo "=== Creating Gradle init script for Nexus publish ==="
        PUBLISH_VERSION="$(params.publish-version)"
        cat > /tmp/init-publish.gradle << 'INITEOF'
        // Gradle init script: configure maven-publish for opensearch-spark-40
        allprojects {
            plugins.withId('java') {
                if (project.name == 'opensearch-spark-40') {
                    apply plugin: 'maven-publish'
                    publishing {
                        publications {
                            maven(MavenPublication) {
                                groupId = 'org.opensearch.client'
                                artifactId = 'opensearch-spark-40_2.13'
                                version = System.getenv('PUBLISH_VERSION')
                                from components.java
                                pom {
                                    name = 'OpenSearch Spark 4.0 (Scala 2.13)'
                                    description = 'opensearch-hadoop spark-40 connector'
                                }
                            }
                        }
                        repositories {
                            maven {
                                name = 'nexus'
                                url = 'http://nexus-nexus-repository-manager.nexus.svc.cluster.local:8081/repository/maven-releases/'
                                credentials {
                                    username = System.getenv('NEXUS_USER')
                                    password = System.getenv('NEXUS_PASSWORD')
                                }
                            }
                        }
                    }
                }
            }
        }
        INITEOF

        echo "=== Building and publishing opensearch-spark-40 ==="
        export PUBLISH_VERSION="$PUBLISH_VERSION"
        ./gradlew :opensearch-spark-40:publish \
          --init-script /tmp/init-publish.gradle \
          -x test -x javadoc -x scaladoc --no-daemon

        echo "=== Publish complete ==="
        COORDS="org.opensearch.client:opensearch-spark-40_2.13:${PUBLISH_VERSION}"
        echo "Published: $COORDS"
        echo -n "$COORDS" > $(results.spark-artifact.path)
