# Executor pod template for Spark on K8s
# Mount to: /opt/spark/conf/executor-pod-template.yaml
# Referenced by: spark.kubernetes.executor.podTemplateFile

apiVersion: v1
kind: Pod
spec:
  # No securityContext override: apache/spark image's WORKDIR /opt/spark/work-dir
  # is owned by uid 185 (spark). Forcing runAsUser:1000 caused
  # AccessDeniedException when Executor.updateDependencies copied fetched JARs
  # into work-dir, killing executors with "Unable to create executor due to
  # ./<jar>". Inherit the image's default user instead.
  volumes:
  - name: spark-checkpoints
    nfs:
      server: 10.10.0.10
      path: /volume1/spark-checkpoints
  # Shared NFS Ivy cache, mounted at the same path on every executor and
  # the driver (zeppelin interpreter). Lets executors load JARs the
  # driver Ivy-resolved without going through the driver's file server.
  - name: spark-ivy-cache
    nfs:
      server: 10.10.0.10
      path: /volume1/spark-ivy-cache
  containers:
  - name: spark-kubernetes-executor
    volumeMounts:
    - name: spark-checkpoints
      mountPath: /mnt/spark-checkpoints
    - name: spark-ivy-cache
      mountPath: /mnt/spark-ivy-cache