# Spark Connect Server - Long-running Spark service with gRPC endpoint
#
# Provides a persistent Spark session that clients can connect to via Spark Connect.
# Clients use: SparkSession.builder.remote("sc://spark-connect.spark.svc:15002").getOrCreate()
#
# Deploy:  kubectl apply -k ops/app-spark-connect/base/
# Check:   kubectl get pods -n spark -l app=spark-connect-server
# Logs:    kubectl logs -n spark -l app=spark-connect-server
# Delete:  kubectl delete -k ops/app-spark-connect/base/
#
# Connect from magnum:
#   export SPARK_REMOTE="sc://spark-connect.spark.svc:15002"
#   pyspark
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-connect-server
  namespace: spark
  labels:
    app: spark-connect-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-connect-server
  template:
    metadata:
      labels:
        app: spark-connect-server
    spec:
      serviceAccountName: spark-operator-spark
      nodeSelector:
        kubernetes.io/hostname: cyberpower
      containers:
        - name: spark-connect
          image: localhost:32000/electinfo/spark-connect-server:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - |
              # Create Ivy cache directory (spark user home is /nonexistent in /etc/passwd)
              mkdir -p /nonexistent/.ivy2.5.2/cache /nonexistent/.ivy2.5.2/jars

              # Start Spark Connect server using properties file
              exec /opt/spark/sbin/start-connect-server.sh \
                --master k8s://https://kubernetes.default.svc:443 \
                --deploy-mode client \
                --name spark-connect-server \
                --properties-file /opt/spark/conf/spark-defaults.conf \
                --conf spark.driver.host=$POD_IP \
                --conf spark.sql.catalogImplementation=in-memory \
                --conf spark.sql.catalog.spark_catalog=info.elect.spark.catalog.PatchedUCSingleCatalog \
                --conf spark.sql.catalog.spark_catalog.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080 \
                --conf spark.sql.catalog.spark_catalog.token= \
                --conf spark.sql.catalog.spark_catalog.uc-catalog=electinfo \
                --conf spark.executor.extraClassPath=/opt/spark/work-dir/*
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          ports:
            - name: spark-connect
              containerPort: 15002
              protocol: TCP
            - name: spark-ui
              containerPort: 4040
              protocol: TCP
            - name: driver-rpc
              containerPort: 7078
              protocol: TCP
            - name: block-manager
              containerPort: 7079
              protocol: TCP
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
              ephemeral-storage: "1Gi"
            limits:
              memory: "16Gi"
              cpu: "8"
              ephemeral-storage: "2Gi"
          volumeMounts:
            - name: spark-conf
              mountPath: /opt/spark/conf
            - name: ivy-cache
              mountPath: /nonexistent
            - name: spark-local
              mountPath: /tmp/spark-local
      volumes:
        - name: spark-conf
          configMap:
            name: spark-connect-config
        - name: ivy-cache
          hostPath:
            path: /mnt/md/nvme/spark-connect/ivy-cache
            type: DirectoryOrCreate
        - name: spark-local
          hostPath:
            path: /mnt/md/nvme/spark-connect/spark-local
            type: DirectoryOrCreate

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-connect-config
  namespace: spark
data:
  spark-defaults.conf: |
    # Spark Connect Server configuration
    # All settings loaded via --properties-file

    # Prometheus metrics
    spark.ui.prometheus.enabled                          true
    spark.metrics.conf                                   /opt/spark/conf/metrics.properties

    # Maven packages (UC connector loaded here for proper classloader integration)
    spark.jars.packages                                  org.apache.hadoop:hadoop-aws:3.4.2,software.amazon.awssdk:bundle:2.29.6,org.neo4j:neo4j-connector-apache-spark_2.13:5.3.10_for_spark_3,org.postgresql:postgresql:42.7.1,io.graphframes:graphframes-spark4_2.13:0.10.0,io.unitycatalog:unitycatalog-spark_2.13:0.4.0-spark410,io.delta:delta-spark_4.1_2.13:4.1.0-spark410,org.opensearch.client:opensearch-spark-40_2.13:1.3.0-spark411
    spark.jars.repositories                               https://repo.elect.info/repository/maven-public/
    spark.jars.ivy                                       /nonexistent/.ivy2.5.2
    # Patched UC catalog JAR (loaded alongside spark.jars.packages for same classloader)
    spark.jars                                           /opt/spark/custom-jars/spark-catalog-patch-1.0.jar

    # Spark Connect session management
    # Prevent session reaping during long-running writes (e.g. 196M voter nodes to Neo4j)
    spark.connect.session.inactive.timeout               24h
    spark.connect.session.closed.timeout                 1h

    # Disable Hive metastore (UC is the sole catalog)
    spark.sql.catalogImplementation                      in-memory

    # Unity Catalog
    spark.sql.defaultCatalog                             electinfo
    spark.sql.catalog.electinfo                          info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.electinfo.uri                      http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.electinfo.token
    spark.sql.catalog.electinfo.renewCredential.enabled  false

    # Derrick Law Firm catalog
    spark.sql.catalog.derricklawfirm                          info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.derricklawfirm.uri                      http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.derricklawfirm.token
    spark.sql.catalog.derricklawfirm.renewCredential.enabled  false

    # Kopser catalog
    spark.sql.catalog.kopser                             info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.kopser.uri                         http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.kopser.token
    spark.sql.catalog.kopser.renewCredential.enabled     false

    # FEC Bulk catalog
    spark.sql.catalog.fec_bulk                           info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.fec_bulk.uri                       http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.fec_bulk.token
    spark.sql.catalog.fec_bulk.renewCredential.enabled   false

    # FL DOE catalog (Florida Division of Elections)
    spark.sql.catalog.fl_doe                             info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.fl_doe.uri                         http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.fl_doe.token
    spark.sql.catalog.fl_doe.renewCredential.enabled     false

    # Census catalog
    spark.sql.catalog.census                             info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.census.uri                         http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.census.token
    spark.sql.catalog.census.renewCredential.enabled     false

    # TEC catalog
    spark.sql.catalog.tec                                info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.tec.uri                            http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.tec.token
    spark.sql.catalog.tec.renewCredential.enabled        false

    # Redistricting Data Hub catalog
    spark.sql.catalog.rdh                                info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.rdh.uri                            http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.rdh.token
    spark.sql.catalog.rdh.renewCredential.enabled        false

    # Civitech catalog
    spark.sql.catalog.civitech                           info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.civitech.uri                       http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.civitech.token
    spark.sql.catalog.civitech.renewCredential.enabled   false

    # S3 scheme mapping
    spark.hadoop.fs.s3.impl                              org.apache.hadoop.fs.s3a.S3AFileSystem

    # Kubernetes settings
    spark.kubernetes.container.image                     localhost:32000/electinfo/spark-executor:latest
    spark.kubernetes.namespace                           spark
    spark.kubernetes.authenticate.driver.serviceAccountName spark-operator-spark
    spark.kubernetes.executor.podTemplateFile            /opt/spark/conf/executor-pod-template.yaml
    spark.kubernetes.file.upload.path                    /tmp/spark-uploads

    # Executor settings
    spark.executor.instances                             5
    spark.executor.cores                                 4
    spark.executor.memory                                24g
    spark.driver.memory                                  8g
    # Include distributed JARs (from spark.jars.packages) on executor system classpath.
    # Without this, /opt/spark/work-dir is on the classpath as a directory (no wildcard),
    # so Hadoop's classloader can't find classes in JARs there (e.g., AwsVendedTokenProvider).
    spark.executor.extraClassPath                        /opt/spark/work-dir/*

    # Dynamic allocation
    spark.dynamicAllocation.enabled                      true
    spark.dynamicAllocation.minExecutors                 0
    spark.dynamicAllocation.maxExecutors                 5
    spark.dynamicAllocation.executorIdleTimeout          120s
    spark.dynamicAllocation.shuffleTracking.enabled      true

    # Event logging
    spark.eventLog.enabled                               true
    spark.eventLog.dir                                   s3a://spark-history/

    # S3A configuration for MinIO
    spark.hadoop.fs.s3a.endpoint                         http://10.10.0.10:9000
    spark.hadoop.fs.s3a.path.style.access                true
    spark.hadoop.fs.s3a.impl                             org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.connection.ssl.enabled           false
    spark.hadoop.fs.s3a.access.key                       electinfo
    spark.hadoop.fs.s3a.secret.key                       electinfo123
    spark.hadoop.fs.s3a.aws.credentials.provider         org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    spark.hadoop.fs.s3a.change.detection.mode            none
    spark.hadoop.fs.s3a.buffer.dir                       /tmp/spark-local

    # OpenSearch connection settings
    spark.opensearch.nodes                               opensearch-cluster-aegis.opensearch.svc.cluster.local
    spark.opensearch.port                                9200
    spark.opensearch.nodes.wan.only                      true
    spark.opensearch.net.ssl                              false

    # S3A-compatible checkpoint manager: catches FileNotFoundException on list()
    spark.sql.streaming.checkpointFileManagerClass       info.elect.spark.streaming.S3ACheckpointFileManager

  metrics.properties: |
    # Enable Prometheus metrics export
    *.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
    *.sink.prometheusServlet.path=/metrics/prometheus
    master.source.jvm.class=org.apache.spark.metrics.source.JvmSource
    worker.source.jvm.class=org.apache.spark.metrics.source.JvmSource
    driver.source.jvm.class=org.apache.spark.metrics.source.JvmSource
    executor.source.jvm.class=org.apache.spark.metrics.source.JvmSource

  executor-pod-template.yaml: |
    apiVersion: v1
    kind: Pod
    spec:
      priorityClassName: data-processing
      terminationGracePeriodSeconds: 30
      containers:
        - name: spark-kubernetes-executor
          volumeMounts:
            - name: spark-local
              mountPath: /tmp/spark-local
            - name: spark-checkpoints
              mountPath: /mnt/spark-checkpoints
      volumes:
        - name: spark-local
          emptyDir:
            sizeLimit: 20Gi
        - name: spark-checkpoints
          nfs:
            server: 10.10.0.10
            path: /volume1/spark-checkpoints
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  spark-app-name: spark-connect-server
              topologyKey: kubernetes.io/hostname

---
# Service to expose Spark Connect endpoint
apiVersion: v1
kind: Service
metadata:
  name: spark-connect
  namespace: spark
  labels:
    app: spark-connect-server
spec:
  type: NodePort
  selector:
    app: spark-connect-server
  ports:
    - name: spark-connect
      port: 15002
      targetPort: 15002
      nodePort: 31500
      protocol: TCP
    - name: spark-ui
      port: 4040
      targetPort: 4040
      nodePort: 30404
      protocol: TCP