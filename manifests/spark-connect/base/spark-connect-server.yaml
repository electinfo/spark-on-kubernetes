    spark.sql.catalog.vt_sos.uri                         http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.vt_sos.token
    spark.sql.catalog.vt_sos.renewCredential.enabled     false


    # Zatelso client data catalog catalog
    spark.sql.catalog.zatelso                         info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.zatelso.uri                     http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.zatelso.token
    spark.sql.catalog.zatelso.renewCredential.enabled false


    # Census TIGER/Line spatial bronze + silver + gold (boundaries, addresses, spatial dimensions for ER blocking) catalog
    spark.sql.catalog.enterprise_geospatial_census    info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.enterprise_geospatial_census.uri http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.enterprise_geospatial_census.token
    spark.sql.catalog.enterprise_geospatial_census.renewCredential.enabled false

    # S3 scheme mapping
    spark.hadoop.fs.s3.impl                              org.apache.hadoop.fs.s3a.S3AFileSystem

    # Kubernetes settings
    spark.kubernetes.container.image                     localhost:32000/electinfo/spark-executor:latest
    spark.kubernetes.namespace                           spark
    spark.kubernetes.authenticate.driver.serviceAccountName spark-operator-spark
    spark.kubernetes.executor.podTemplateFile            /opt/spark/conf/executor-pod-template.yaml
    spark.kubernetes.file.upload.path                    /tmp/spark-uploads

    # Executor settings
    spark.executor.instances                             5
    spark.executor.cores                                 4
    spark.executor.memory                                24g
    spark.driver.memory                                  8g
    # Include custom JARs and distributed JARs on executor classpath.
    # Driver classpath is set via --driver-class-path in the startup command.
    spark.executor.extraClassPath                        /opt/spark/custom-jars/*:/opt/spark/work-dir/*

    # Dynamic allocation
    spark.dynamicAllocation.enabled                      true
    spark.dynamicAllocation.minExecutors                 0
    spark.dynamicAllocation.maxExecutors                 5
    spark.dynamicAllocation.executorIdleTimeout          120s
    spark.dynamicAllocation.shuffleTracking.enabled      true

    # Event logging
    spark.eventLog.enabled                               true
    spark.eventLog.dir                                   s3a://spark-history/

    # S3A configuration for s3proxy (asustor)
    spark.hadoop.fs.s3a.endpoint                         http://10.10.0.10:9000
    spark.hadoop.fs.s3a.path.style.access                true
    spark.hadoop.fs.s3a.impl                             org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.connection.ssl.enabled           false
    spark.hadoop.fs.s3a.access.key                       electinfo
    spark.hadoop.fs.s3a.secret.key                       electinfo123
    spark.hadoop.fs.s3a.aws.credentials.provider         org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    spark.hadoop.fs.s3a.change.detection.mode            none
    spark.hadoop.fs.s3a.buffer.dir                       /tmp/spark-local

    # Multipart upload tuning for s3proxy. JClouds-backed multipart loses parts under high
    # concurrency (manifests as InvalidPart on CompleteMultipartUpload). Strategy: fewer/
    # larger parts and lower concurrency per writer so the backend never holds many in-flight
    # parts for one upload. Defaults (64MB / 4 active blocks) trip InvalidPart on writes
    # ~30GB+; 256MB / 2 active blocks tolerated 60GB fec_filings.silver.sa.
    spark.hadoop.fs.s3a.multipart.size                   268435456
    spark.hadoop.fs.s3a.multipart.threshold              268435456
    spark.hadoop.fs.s3a.fast.upload                      true
    spark.hadoop.fs.s3a.fast.upload.buffer               disk
    spark.hadoop.fs.s3a.fast.upload.active.blocks        2
    spark.hadoop.fs.s3a.connection.maximum               50
    spark.hadoop.fs.s3a.retry.limit                      10
    spark.hadoop.fs.s3a.retry.interval                   1000ms
    # Explicit file committer — do NOT switch to magic; s3proxy doesn't handle the magic
    # committer's marker semantics correctly.
    spark.hadoop.fs.s3a.committer.name                   file

    # s3:// scheme — routed to S3AFileSystem via fs.s3.impl above; S3AFileSystem
    # reads config keyed on the URL scheme, so mirror the s3a endpoint / creds
    # / change-detection settings here. Some UC-registered tables store their
    # location with scheme s3:// (rather than s3a://); without this block,
    # those reads fail with `Change detection policy requires ETag` because
    # MinIO/s3proxy doesn't return ETags.
    spark.hadoop.fs.s3.endpoint                          http://10.10.0.10:9000
    spark.hadoop.fs.s3.path.style.access                 true
    spark.hadoop.fs.s3.connection.ssl.enabled            false
    spark.hadoop.fs.s3.access.key                        electinfo
    spark.hadoop.fs.s3.secret.key                        electinfo123
    spark.hadoop.fs.s3.aws.credentials.provider          org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    spark.hadoop.fs.s3.change.detection.mode             none
    spark.hadoop.fs.s3.buffer.dir                        /tmp/spark-local
    # Mirror multipart tuning for s3:// (UC-registered tables use this scheme).
    spark.hadoop.fs.s3.multipart.size                    268435456
    spark.hadoop.fs.s3.multipart.threshold               268435456
    spark.hadoop.fs.s3.fast.upload                       true
    spark.hadoop.fs.s3.fast.upload.buffer                disk
    spark.hadoop.fs.s3.fast.upload.active.blocks         2
    spark.hadoop.fs.s3.connection.maximum                50
    spark.hadoop.fs.s3.retry.limit                       10
    spark.hadoop.fs.s3.retry.interval                    1000ms
    spark.hadoop.fs.s3.committer.name                    file

    # OpenSearch connection settings
    spark.opensearch.nodes                               opensearch-cluster-aegis.opensearch.svc.cluster.local
    spark.opensearch.port                                9200
    spark.opensearch.nodes.wan.only                      true
    spark.opensearch.net.ssl                              false

    # S3A-compatible checkpoint manager: catches FileNotFoundException on list()
    spark.sql.streaming.checkpointFileManagerClass       info.elect.spark.streaming.S3ACheckpointFileManager

  metrics.properties: |
    # Enable Prometheus metrics export
    *.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
    *.sink.prometheusServlet.path=/metrics/prometheus
    master.source.jvm.class=org.apache.spark.metrics.source.JvmSource
    worker.source.jvm.class=org.apache.spark.metrics.source.JvmSource
    driver.source.jvm.class=org.apache.spark.metrics.source.JvmSource
    executor.source.jvm.class=org.apache.spark.metrics.source.JvmSource

  executor-pod-template.yaml: |
    apiVersion: v1
    kind: Pod
    spec:
      priorityClassName: data-processing
      terminationGracePeriodSeconds: 30
      containers:
        - name: spark-kubernetes-executor
          volumeMounts:
            - name: spark-local
              mountPath: /tmp/spark-local
            - name: spark-checkpoints
              mountPath: /mnt/spark-checkpoints
      volumes:
        - name: spark-local
          emptyDir:
            sizeLimit: 20Gi
        - name: spark-checkpoints
          nfs:
            server: 10.10.0.10
            path: /volume1/spark-checkpoints
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  spark-app-name: spark-connect-server
              topologyKey: kubernetes.io/hostname

---
# Service to expose Spark Connect endpoint
apiVersion: v1
kind: Service
metadata:
  name: spark-connect
  namespace: spark
  labels:
    app: spark-connect-server
spec:
  type: NodePort
  selector:
    app: spark-connect-server
  ports:
    - name: spark-connect
      port: 15002
      targetPort: 15002
      nodePort: 31500
      protocol: TCP
    - name: spark-ui
      port: 4040
      targetPort: 4040
      nodePort: 30404
      protocol: TCP