# Spark Connect Server - Long-running Spark service with gRPC endpoint
#
# Provides a persistent Spark session that clients can connect to via Spark Connect.
# Clients use: SparkSession.builder.remote("sc://spark-connect.spark.svc:15002").getOrCreate()
#
# Deploy:  kubectl apply -k ops/app-spark-connect/base/
# Check:   kubectl get pods -n spark -l app=spark-connect-server
# Logs:    kubectl logs -n spark -l app=spark-connect-server
# Delete:  kubectl delete -k ops/app-spark-connect/base/
#
# Connect from magnum:
#   export SPARK_REMOTE="sc://spark-connect.spark.svc:15002"
#   pyspark
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-connect-server
  namespace: spark
  labels:
    app: spark-connect-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-connect-server
  template:
    metadata:
      labels:
        app: spark-connect-server
    spec:
      serviceAccountName: spark-operator-spark
      nodeSelector:
        kubernetes.io/hostname: cyberpower
      containers:
        - name: spark-connect
          image: localhost:32000/electinfo/spark-connect-server:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - |
              # Create Ivy cache directory (spark user home is /nonexistent in /etc/passwd)
              mkdir -p /nonexistent/.ivy2.5.2/cache /nonexistent/.ivy2.5.2/jars

              # Start Spark Connect server using properties file
              exec /opt/spark/sbin/start-connect-server.sh \
                --master k8s://https://kubernetes.default.svc:443 \
                --deploy-mode client \
                --name spark-connect-server \
                --properties-file /opt/spark/conf/spark-defaults.conf \
                --driver-class-path "/opt/spark/custom-jars/*" \
                --conf spark.driver.host=$POD_IP \
                --conf spark.sql.catalogImplementation=in-memory \
                --conf spark.sql.catalog.spark_catalog=info.elect.spark.catalog.PatchedUCSingleCatalog \
                --conf spark.sql.catalog.spark_catalog.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080 \
                --conf spark.sql.catalog.spark_catalog.token= \
                --conf spark.sql.catalog.spark_catalog.uc-catalog=electinfo \
                --conf spark.driver.maxResultSize=4g \
                --conf spark.executor.extraClassPath=/opt/spark/custom-jars/*:/opt/spark/work-dir/*
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          ports:
            - name: spark-connect
              containerPort: 15002
              protocol: TCP
            - name: spark-ui
              containerPort: 4040
              protocol: TCP
            - name: driver-rpc
              containerPort: 7078
              protocol: TCP
            - name: block-manager
              containerPort: 7079
              protocol: TCP
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
              ephemeral-storage: "1Gi"
            limits:
              memory: "16Gi"
              cpu: "8"
              ephemeral-storage: "2Gi"
          volumeMounts:
            - name: spark-conf
              mountPath: /opt/spark/conf
            - name: ivy-cache
              mountPath: /nonexistent
            - name: spark-local
              mountPath: /tmp/spark-local
            - name: splink-tmp
              mountPath: /mnt/splink-tmp
              readOnly: true
      volumes:
        - name: spark-conf
          configMap:
            name: spark-connect-config
        - name: ivy-cache
          hostPath:
            path: /mnt/md/nvme/spark-connect/ivy-cache
            type: DirectoryOrCreate
        - name: spark-local
          hostPath:
            path: /mnt/md/nvme/spark-connect/spark-local
            type: DirectoryOrCreate
        - name: splink-tmp
          hostPath:
            path: /mnt/md/nvme/splink-runner/tmp
            type: DirectoryOrCreate

---
