    spark.jars.packages                                  org.apache.hadoop:hadoop-aws:3.4.2,software.amazon.awssdk:bundle:2.29.6,org.neo4j:neo4j-connector-apache-spark_2.13:5.3.10_for_spark_3,org.postgresql:postgresql:42.7.1,io.graphframes:graphframes-spark4_2.13:0.10.0,io.unitycatalog:unitycatalog-spark_2.13:0.4.0-spark410,io.delta:delta-spark_4.1_2.13:4.1.0-spark410,org.opensearch.client:opensearch-spark-40_2.13:1.3.0-spark411
    spark.jars.repositories                               https://repo.elect.info/repository/maven-public/
    spark.jars.ivy                                       /nonexistent/.ivy2.5.2
    # Patched UC catalog JAR (also loaded via --driver-class-path for early classloader access)
    spark.jars                                           /opt/spark/custom-jars/spark-catalog-patch.jar

    # Spark Connect session management
    # Prevent session reaping during long-running writes (e.g. 196M voter nodes to Neo4j)
    spark.connect.session.inactive.timeout               24h
