---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fec-pipeline-readiness-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  fec-pipeline-readiness.json: |
    {
      "annotations": { "list": [] },
      "description": "EE pipeline health: DLT run status, table inventory, row counts, sentinel coverage, schema drift, ESQ Gold freshness",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "refresh": "5m",
      "schemaVersion": 38,
      "tags": ["fec", "enterprise", "pipeline", "readiness"],
      "time": { "from": "now-7d", "to": "now" },
      "timepicker": {},
      "timezone": "America/Chicago",
      "title": "FEC EE Pipeline Readiness",
      "uid": "fec-pipeline-readiness",
      "version": 2,
      "templating": {
        "list": [
          {
            "name": "catalog_view",
            "type": "custom",
            "label": "Catalog View",
            "hide": 0,
            "options": [
              { "text": "Experimental — fec_filings_enterprise_experimental", "value": "fec_filings_enterprise_experimental", "selected": true }
            ],
            "current": { "text": "Experimental — fec_filings_enterprise_experimental", "value": "fec_filings_enterprise_experimental" },
            "query": "Experimental — fec_filings_enterprise_experimental : fec_filings_enterprise_experimental"
          },
          {
            "name": "cycle",
            "type": "query",
            "label": "Cycle",
            "hide": 0,
            "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
            "query": "SELECT DISTINCT cycle::text FROM monitoring.fec_ee_table_inventory WHERE cycle IS NOT NULL ORDER BY 1 DESC",
            "refresh": 2,
            "sort": 3,
            "multi": false,
            "includeAll": true,
            "allValue": "All",
            "current": {}
          },
          {
            "name": "schema",
            "type": "query",
            "label": "Schema",
            "hide": 0,
            "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
            "query": "SELECT DISTINCT schema_name FROM monitoring.fec_ee_table_inventory ORDER BY 1",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": "All",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 10,
          "type": "row",
          "title": "DLT Pipeline Run Status",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 1,
          "type": "table",
          "title": "Last DLT Run — per schema",
          "description": "Pipeline run metadata from Unity Catalog schema properties",
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 1 },
          "options": {
            "footer": { "show": false },
            "showHeader": true,
            "sortBy": [{ "displayName": "schema_name" }]
          },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "last_run_status" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "mappings", "value": [
                    { "type": "value", "options": {
                      "success": { "color": "green", "text": "success" },
                      "failed":  { "color": "red",   "text": "failed" },
                      "running": { "color": "blue",  "text": "running" }
                    }}
                  ]}
                ]
              },
              {
                "matcher": { "id": "byName", "options": "last_run_at" },
                "properties": [{ "id": "unit", "value": "dateTimeAsLocal" }]
              },
              {
                "matcher": { "id": "byName", "options": "last_run_duration_sec" },
                "properties": [
                  { "id": "unit", "value": "s" },
                  { "id": "displayName", "value": "duration" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "last_run_table_count" },
                "properties": [{ "id": "displayName", "value": "tables" }]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT schema_name, last_run_status, last_run_at, last_run_duration_sec, last_run_table_count, last_run_execution_id, last_run_version FROM monitoring.fec_ee_pipeline_status WHERE collected_at = (SELECT MAX(collected_at) FROM monitoring.fec_ee_pipeline_status) AND catalog = '${catalog_view}' ORDER BY schema_name",
              "refId": "A"
            }
          ]
        },
        {
          "id": 20,
          "type": "row",
          "title": "Bronze Coverage",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 }
        },
        {
          "id": 2,
          "type": "table",
          "title": "Table Inventory — cycle × schema",
          "description": "Count of registered UC tables per schema and election cycle",
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "options": { "footer": { "show": false }, "showHeader": true },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "table_count" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "thresholds", "value": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "yellow", "value": 1 },
                      { "color": "green", "value": 10 }
                    ]
                  }}
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT schema_name, COALESCE(cycle::text, 'N/A') AS cycle, COUNT(*) AS table_count FROM monitoring.fec_ee_table_inventory WHERE collected_at = (SELECT MAX(collected_at) FROM monitoring.fec_ee_table_inventory) AND catalog = '${catalog_view}' AND ('${cycle}' = 'All' OR cycle::text = '${cycle}') AND ('${schema}' = 'All' OR schema_name = ANY(string_to_array('${schema:csv}', ','))) GROUP BY schema_name, cycle ORDER BY schema_name, cycle",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "table",
          "title": "Bronze Sentinel Coverage — monthly .done files",
          "description": "s3://fec-filings/partitioned/cycle=N/_months/YYYY-MM.done present at last scrape",
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "options": { "footer": { "show": false }, "showHeader": true },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "sentinel_count" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "thresholds", "value": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "yellow", "value": 1 },
                      { "color": "green", "value": 6 }
                    ]
                  }}
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT cycle, COUNT(*) AS sentinel_count, MIN(month) AS earliest_month, MAX(month) AS latest_month FROM monitoring.fec_ee_sentinels WHERE collected_at = (SELECT MAX(collected_at) FROM monitoring.fec_ee_sentinels) AND ('${cycle}' = 'All' OR cycle::text = '${cycle}') GROUP BY cycle ORDER BY cycle DESC",
              "refId": "A"
            }
          ]
        },
        {
          "id": 30,
          "type": "row",
          "title": "Data Volume",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Row Counts per (schema, cycle) — over time",
          "description": "Total rows scraped from Parquet footers per schema/cycle combination, one point per CronJob run",
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 17 },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 2, "fillOpacity": 8 },
              "unit": "short"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
              "format": "time_series",
              "rawQuery": true,
              "rawSql": "SELECT collected_at AS \"time\", schema_name || CASE WHEN cycle IS NOT NULL THEN ' / ' || cycle::text ELSE '' END AS metric, SUM(row_count) AS value FROM monitoring.fec_ee_row_counts WHERE $__timeFilter(collected_at) AND catalog = '${catalog_view}' AND ('${cycle}' = 'All' OR cycle::text = '${cycle}') AND ('${schema}' = 'All' OR schema_name = ANY(string_to_array('${schema:csv}', ','))) GROUP BY 1, 2 ORDER BY 1",
              "refId": "A"
            }
          ]
        },
        {
          "id": 40,
          "type": "row",
          "title": "Data Quality & Freshness",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 26 }
        },
        {
          "id": 5,
          "type": "table",
          "title": "Schema Drift — parquet families not in hydra registry",
          "description": "form_family values in s3://fec-filings/partitioned/ with no YAML in the parsers wheel — these families produce zero silver rows",
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
          "gridPos": { "h": 8, "w": 14, "x": 0, "y": 27 },
          "options": { "footer": { "show": false }, "showHeader": true },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "in_hydra_registry" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "mappings", "value": [
                    { "type": "value", "options": {
                      "false": { "color": "red",   "text": "MISSING" },
                      "true":  { "color": "green", "text": "OK" }
                    }}
                  ]}
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT form_family, cycle, in_hydra_registry FROM monitoring.fec_ee_schema_drift WHERE collected_at = (SELECT MAX(collected_at) FROM monitoring.fec_ee_schema_drift) AND NOT in_hydra_registry AND ('${cycle}' = 'All' OR cycle::text = '${cycle}') ORDER BY cycle DESC, form_family",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "ESQ Gold Delta Freshness",
          "description": "Hours since last _delta_log commit in s3://hive-warehouse/enterprise_bulk_v2/{table}/. Green < 24 h, yellow < 72 h, red ≥ 72 h.",
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
          "gridPos": { "h": 8, "w": 10, "x": 14, "y": 27 },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "vertical",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "age_hours", "values": true },
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 24 },
                  { "color": "red",    "value": 72 }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "efmrsj6vb5ekgc" },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT table_name, age_hours FROM monitoring.fec_ee_esq_freshness WHERE collected_at = (SELECT MAX(collected_at) FROM monitoring.fec_ee_esq_freshness) ORDER BY table_name",
              "refId": "A"
            }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": {} },
            { "id": "organize", "options": { "renameByName": { "table_name": "Table", "age_hours": "Age (h)" } } }
          ]
        }
      ]
    }
