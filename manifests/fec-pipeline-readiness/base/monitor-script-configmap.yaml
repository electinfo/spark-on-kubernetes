---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fec-pipeline-monitor-script
  namespace: enterprise
data:
  scraper.py: |
    #!/usr/bin/env python3
    """FEC EE pipeline readiness scraper.

    Collects monitoring metrics for fec_filings_enterprise_experimental and
    writes snapshots into monitoring.fec_ee_* tables in PostGIS.

    Env vars required:
      UC_URL          http://app-unity-catalog.electinfo.svc.cluster.local:8080
      UC_TOKEN        Unity Catalog service token
      S3_ENDPOINT     http://10.10.0.10:9000
      S3_ACCESS_KEY   MinIO access key
      S3_SECRET_KEY   MinIO secret key
      DB_DSN          postgresql://postgres:...@10.10.0.101:31543/electinfo
    """

    import json
    import os
    import re
    import urllib.request
    from datetime import datetime, timezone
    from typing import Optional

    import boto3
    import psycopg2
    import pyarrow as pa
    import pyarrow.fs as pafs
    import pyarrow.parquet as pq

    UC_URL        = os.environ["UC_URL"]
    UC_TOKEN      = os.environ["UC_TOKEN"]
    S3_ENDPOINT   = os.environ["S3_ENDPOINT"]
    S3_ACCESS_KEY = os.environ["S3_ACCESS_KEY"]
    S3_SECRET_KEY = os.environ["S3_SECRET_KEY"]
    DB_DSN        = os.environ["DB_DSN"]

    EE_CATALOG = "fec_filings_enterprise_experimental"
    EE_SCHEMAS = ["bronze", "silver_exp", "gold_edges", "gold_nodes"]

    BRONZE_BUCKET = "fec-filings"
    BRONZE_PREFIX = "partitioned/"
    ESQ_BUCKET    = "hive-warehouse"
    ESQ_PREFIX    = "enterprise_bulk_v2/"
    ESQ_TABLES    = ["committee_summary", "individual_contributions", "operating_expenditures"]

    NOW = datetime.now(timezone.utc)


    def uc_get(path: str) -> dict:
        req = urllib.request.Request(
            f"{UC_URL}{path}",
            headers={"Authorization": f"Bearer {UC_TOKEN}"},
        )
        with urllib.request.urlopen(req, timeout=30) as resp:
            return json.loads(resp.read())


    def uc_list_all(base_path: str, key: str) -> list:
        results, page_token = [], None
        while True:
            url = f"{base_path}&max_results=200"
            if page_token:
                url += f"&page_token={page_token}"
            data = uc_get(url)
            results.extend(data.get(key, []))
            page_token = data.get("next_page_token")
            if not page_token:
                break
        return results


    def make_s3():
        return boto3.client(
            "s3",
            endpoint_url=S3_ENDPOINT,
            aws_access_key_id=S3_ACCESS_KEY,
            aws_secret_access_key=S3_SECRET_KEY,
        )


    def make_arrow_fs() -> pafs.S3FileSystem:
        endpoint = S3_ENDPOINT.replace("http://", "").replace("https://", "")
        scheme = "http" if S3_ENDPOINT.startswith("http://") else "https"
        return pafs.S3FileSystem(
            access_key=S3_ACCESS_KEY,
            secret_key=S3_SECRET_KEY,
            endpoint_override=endpoint,
            scheme=scheme,
        )


    def s3_list_prefixes(s3, bucket: str, prefix: str) -> list:
        prefixes = []
        paginator = s3.get_paginator("list_objects_v2")
        for page in paginator.paginate(Bucket=bucket, Prefix=prefix, Delimiter="/"):
            for p in page.get("CommonPrefixes", []):
                prefixes.append(p["Prefix"])
        return prefixes


    def parquet_row_count(arrow_fs: pafs.S3FileSystem, bucket: str, prefix: str) -> Optional[int]:
        try:
            fs_prefix = f"{bucket}/{prefix}"
            file_info = arrow_fs.get_file_info(pafs.FileSelector(fs_prefix, recursive=True))
            parquet_files = [f.path for f in file_info if f.path.endswith(".parquet") and f.type == pafs.FileType.File]
            if not parquet_files:
                return None
            total = 0
            for path in parquet_files:
                try:
                    meta = pq.read_metadata(path, filesystem=arrow_fs)
                    total += meta.num_rows
                except Exception:
                    pass
            return total if total > 0 else None
        except Exception:
            return None


    def collect_table_inventory(conn) -> list:
        rows = []
        for schema in EE_SCHEMAS:
            tables = uc_list_all(
                f"/api/2.1/unity-catalog/tables?catalog_name={EE_CATALOG}&schema_name={schema}",
                "tables",
            )
            for t in tables:
                name = t["name"]
                m = re.match(r"^(.+)_(\d{4})$", name)
                cycle = int(m.group(2)) if m else None
                family = m.group(1) if m else None
                rows.append((EE_CATALOG, schema, name, cycle, family))
        with conn.cursor() as cur:
            cur.executemany(
                """
                INSERT INTO monitoring.fec_ee_table_inventory
                  (collected_at, catalog, schema_name, table_name, cycle, form_family)
                VALUES (%s, %s, %s, %s, %s, %s)
                ON CONFLICT DO NOTHING
                """,
                [(NOW, *r) for r in rows],
            )
        conn.commit()
        print(f"[inventory] {len(rows)} tables")
        return rows


    def collect_row_counts(conn, rows: list):
        arrow_fs = make_arrow_fs()
        written = 0
        for catalog, schema, table_name, cycle, _family in rows:
            prefix = f"fec_filings_enterprise_experimental/{schema}/{table_name}/"
            count = parquet_row_count(arrow_fs, "hive-warehouse", prefix)
            if count is None:
                continue
            with conn.cursor() as cur:
                cur.execute(
                    """
                    INSERT INTO monitoring.fec_ee_row_counts
                      (collected_at, catalog, schema_name, table_name, cycle, row_count)
                    VALUES (%s, %s, %s, %s, %s, %s)
                    ON CONFLICT DO NOTHING
                    """,
                    (NOW, catalog, schema, table_name, cycle, count),
                )
            written += 1
        conn.commit()
        print(f"[row_counts] {written} tables")


    def collect_sentinels(conn, s3):
        rows = []
        paginator = s3.get_paginator("list_objects_v2")
        for cp in s3_list_prefixes(s3, BRONZE_BUCKET, BRONZE_PREFIX):
            m = re.search(r"cycle=(\d{4})", cp)
            if not m:
                continue
            cycle = int(m.group(1))
            for page in paginator.paginate(Bucket=BRONZE_BUCKET, Prefix=cp + "_months/"):
                for obj in page.get("Contents", []):
                    key = obj["Key"]
                    if key.endswith(".done"):
                        month = key.split("/")[-1].replace(".done", "")
                        rows.append((cycle, month, key))
        with conn.cursor() as cur:
            cur.executemany(
                """
                INSERT INTO monitoring.fec_ee_sentinels
                  (collected_at, cycle, month, sentinel_key)
                VALUES (%s, %s, %s, %s)
                ON CONFLICT DO NOTHING
                """,
                [(NOW, cycle, month, key) for cycle, month, key in rows],
            )
        conn.commit()
        print(f"[sentinels] {len(rows)} sentinels")


    def collect_schema_drift(conn, s3):
        parquet_families: set = set()
        for cp in s3_list_prefixes(s3, BRONZE_BUCKET, BRONZE_PREFIX):
            m = re.search(r"cycle=(\d{4})", cp)
            if not m:
                continue
            cycle = int(m.group(1))
            for fp in s3_list_prefixes(s3, BRONZE_BUCKET, cp):
                fm = re.search(r"form_family=([^/]+)/", fp)
                if fm:
                    parquet_families.add((fm.group(1), cycle))

        try:
            from parsers.fec_hydra_schema import all_families  # type: ignore
            hydra_set = set(all_families())
        except ImportError:
            hydra_set = set()
            print("[schema_drift] parsers not installed; hydra_set empty")

        rows = [(fam, cyc, True, fam in hydra_set) for fam, cyc in parquet_families]
        with conn.cursor() as cur:
            cur.executemany(
                """
                INSERT INTO monitoring.fec_ee_schema_drift
                  (collected_at, form_family, cycle, has_parquet, in_hydra_registry)
                VALUES (%s, %s, %s, %s, %s)
                ON CONFLICT DO NOTHING
                """,
                [(NOW, *r) for r in rows],
            )
        conn.commit()
        print(f"[schema_drift] {len(rows)} families")


    def collect_esq_freshness(conn, s3):
        rows = []
        for table in ESQ_TABLES:
            prefix = f"{ESQ_PREFIX}{table}/_delta_log/"
            try:
                paginator = s3.get_paginator("list_objects_v2")
                objects = []
                for page in paginator.paginate(Bucket=ESQ_BUCKET, Prefix=prefix):
                    objects.extend(page.get("Contents", []))
                if not objects:
                    continue
                latest = max(objects, key=lambda o: o["LastModified"])
                last_mod = latest["LastModified"]
                if last_mod.tzinfo is None:
                    last_mod = last_mod.replace(tzinfo=timezone.utc)
                age_hours = (NOW - last_mod).total_seconds() / 3600
                rows.append((table, f"s3://{ESQ_BUCKET}/{ESQ_PREFIX}{table}/", last_mod, round(age_hours, 2)))
            except Exception as e:
                print(f"[esq_freshness] error for {table}: {e}")
        with conn.cursor() as cur:
            cur.executemany(
                """
                INSERT INTO monitoring.fec_ee_esq_freshness
                  (collected_at, table_name, s3_path, last_modified_at, age_hours)
                VALUES (%s, %s, %s, %s, %s)
                ON CONFLICT DO NOTHING
                """,
                [(NOW, *r) for r in rows],
            )
        conn.commit()
        print(f"[esq_freshness] {len(rows)} tables")


    def main():
        s3   = make_s3()
        conn = psycopg2.connect(DB_DSN)
        try:
            inventory = collect_table_inventory(conn)
            collect_row_counts(conn, inventory)
            collect_sentinels(conn, s3)
            collect_schema_drift(conn, s3)
            collect_esq_freshness(conn, s3)
        finally:
            conn.close()
        print("[done]")


    if __name__ == "__main__":
        main()
