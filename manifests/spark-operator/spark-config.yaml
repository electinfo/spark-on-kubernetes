apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-operator-config
  namespace: spark
data:
  spark-defaults.conf: |
    # Hive Metastore
    spark.hadoop.hive.metastore.uris=thrift://app-hive.electinfo.svc.cluster.local:9083
    spark.sql.catalogImplementation=hive
    spark.sql.hive.metastore.version=4.1.0
    spark.sql.hive.metastore.jars=path
    spark.sql.hive.metastore.jars.path=file:///opt/spark/hive4/*
    spark.sql.warehouse.dir=s3a://hive-warehouse/

    # Unity Catalog (named V2 catalogs alongside Hive session catalog)
    spark.sql.defaultCatalog=electinfo
    spark.sql.catalog.electinfo=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.electinfo.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.electinfo.token=
    spark.sql.catalog.electinfo.renewCredential.enabled=false
    spark.sql.catalog.derricklawfirm=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.derricklawfirm.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.derricklawfirm.token=
    spark.sql.catalog.derricklawfirm.renewCredential.enabled=false
    spark.sql.catalog.kopser=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.kopser.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.kopser.token=
    spark.sql.catalog.kopser.renewCredential.enabled=false
    spark.sql.catalog.fec_bulk=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.fec_bulk.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.fec_bulk.token=
    spark.sql.catalog.fec_bulk.renewCredential.enabled=false
    spark.sql.catalog.fl_doe=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.fl_doe.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.fl_doe.token=
    spark.sql.catalog.fl_doe.renewCredential.enabled=false
    spark.sql.catalog.census=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.census.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.census.token=
    spark.sql.catalog.census.renewCredential.enabled=false
    spark.sql.catalog.tec=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.tec.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.tec.token=
    spark.sql.catalog.tec.renewCredential.enabled=false
    spark.sql.catalog.rdh=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.rdh.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.rdh.token=
    spark.sql.catalog.rdh.renewCredential.enabled=false
    spark.sql.catalog.civitech=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.civitech.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.civitech.token=
    spark.sql.catalog.civitech.renewCredential.enabled=false
    spark.sql.catalog.congress_gov=info.elect.spark.catalog.PatchedUCSingleCatalog
    spark.sql.catalog.congress_gov.uri=http://app-unity-catalog.electinfo.svc.cluster.local:8080
    spark.sql.catalog.congress_gov.token=
    spark.sql.catalog.congress_gov.renewCredential.enabled=false

    # S3A Configuration (s3proxy on asustor)
    spark.hadoop.fs.defaultFS=s3a://static-pages
    spark.hadoop.fs.s3a.endpoint=http://10.10.0.10:9000
    spark.hadoop.fs.s3a.path.style.access=true
    spark.hadoop.fs.s3a.access.key=electinfo
    spark.hadoop.fs.s3a.secret.key=electinfo123
    spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    spark.hadoop.fs.s3a.connection.ssl.enabled=false
    spark.hadoop.fs.s3a.change.detection.mode=none
    spark.hadoop.fs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem

    # Ivy Cache (writable)
    spark.jars.ivySettings=/opt/spark/conf/ivysettings.xml

    # Performance
    spark.eventLog.enabled=false
    spark.sql.adaptive.enabled=true

    # Ivy and home directory settings (log4j config is set via JAVA_TOOL_OPTIONS env var in SparkApplication)
    spark.driver.extraJavaOptions=-Duser.home=/tmp -Divy.default.ivy.user.dir=/tmp/.ivy2 -Divy.settings.file=/opt/spark/conf/ivysettings.xml
    spark.executor.extraJavaOptions=-Duser.home=/tmp -Divy.default.ivy.user.dir=/tmp/.ivy2

  # NOTE: Do NOT add log4j2.properties here. The Spark Operator v2.1.0 webhook
  # auto-detects this key and injects a subPath volume mount at
  # /opt/spark/conf/log4j2.properties, which fails because /opt/spark/conf
  # already has projected volumes. Logging is controlled via
  # -Droot.logger.level=WARN in extraJavaOptions instead.